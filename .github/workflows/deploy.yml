# .github/workflows/deploy.yml
name: CI/CD to Google Cloud Run

on:
  push:
    branches:
      - main # Change this to your main branch name

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Set this in GitHub Secrets
  REGION: us-central1 # Update with your preferred region
  REPOSITORY: aivn-images # The name of your Artifact Registry repository
  BACKEND_SERVICE_NAME: aivn-backend
  FRONTEND_SERVICE_NAME: aivn-frontend

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Log in to Google Cloud with Service Account Key
      # Or use Workload Identity (preferred) via `auth` action
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Deploy Backend to Cloud Run
        working-directory: ./backend
        run: |
          gcloud run deploy ${BACKEND_SERVICE_NAME} \
            --source . \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --port 8000 \
            --timeout 300 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend # Deploy frontend after backend to easily reference URLs if needed

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Deploy Frontend to Cloud Run
        working-directory: ./frontend
        run: |
          gcloud run deploy ${FRONTEND_SERVICE_NAME} \
            --source . \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --port 8080 \
            --set-env-vars "VITE_API_URL=${{ secrets.VITE_API_URL }}" \
            --quiet
